<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刻刻帝 — API 开放平台导航</title>
<!-- Preload critical above-fold images -->
<link rel="preload" as="image" href="assets/images/avatar.png" fetchpriority="high">
<link rel="preload" as="image" href="assets/images/bg.webp" fetchpriority="high">
<style>
/* ═══════════════════════════════════════════
   时崎狂三 角色视觉分析 & 配色提炼
   ═══════════════════════════════════════════
   发色：黑色，双马尾
   瞳色：左眼红色（时钟瞳），右眼琥珀/金色
   代表元素：时钟、齿轮、蔷薇、哥特蕾丝
   灵装：神威灵装·三番 — 黑色哥特洛丽塔裙
   标志道具：刻刻帝（巨大时钟）、短火枪
   主色调：黑 / 深红 / 金色

   配色方案：
     主背景色    #0b0810  深紫黑
     强调色-红   #a81c2e  深蔷薇红
     强调色-金   #c9a35a  复古金
     文字主色    #e4d5b7  暖象牙
     文字副色    #8a7b6b  灰褐
     卡片底色    rgba(18,12,22,0.65)  半透明深紫黑
     卡片边框    rgba(168,28,46,0.3)  暗红
     发光色      rgba(201,163,90,0.6)  金光
   ═══════════════════════════════════════════ */

/* Fonts loaded async via JS below to avoid render-blocking */

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
/* Mobile: no blue highlight on tap */
*, *:active, *:focus { -webkit-tap-highlight-color: transparent; outline: none; }
*:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

:root {
  --bg-deep: #0b0810;
  --crimson: #a81c2e;
  --crimson-light: #d43048;
  --gold: #c9a35a;
  --gold-bright: #e8c88a;
  --gold-pale: #f0dbb0;
  --text-main: #e4d5b7;
  --text-dim: #8a7b6b;
  --card-bg: rgba(18,12,22,0.65);
  --card-border: rgba(168,28,46,0.25);
  --glow-gold: rgba(201,163,90,0.5);
  --glow-red: rgba(168,28,46,0.4);
  --radius: 20px;
  --transition: 0.4s cubic-bezier(0.34, 1.4, 0.64, 1);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Serif SC', Georgia, 'Times New Roman', serif;
  color: var(--text-main);
  min-height: 100vh;
  line-height: 1.6;
  overflow-x: hidden;
  position: relative;
  background: var(--bg-deep);
}

/* ═══ Fullscreen background image + overlay ═══ */
.bg-layer {
  position: fixed;
  inset: 0;
  z-index: -2;
  background: url('assets/images/bg.webp') center/cover no-repeat;
}
.bg-overlay {
  position: fixed;
  inset: 0;
  z-index: -1;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(168,28,46,0.15) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 30%, rgba(201,163,90,0.08) 0%, transparent 50%),
    linear-gradient(180deg, rgba(11,8,16,0.92) 0%, rgba(11,8,16,0.85) 50%, rgba(11,8,16,0.95) 100%);
  pointer-events: none;
}

/* ═══ Full-page rose petals ═══ */
.rose-petals {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 999;
  overflow: hidden;
}
.rose-petal {
  position: absolute;
  top: -40px;
  opacity: 0;
  animation: petalFall linear infinite;
  will-change: transform, opacity;
}
@keyframes petalFall {
  0% {
    opacity: 0;
    transform: translateY(0) translateX(0) rotate(0deg) scale(0.8);
  }
  8% {
    opacity: 0.8;
    transform: translateY(5vh) translateX(15px) rotate(45deg) scale(1);
  }
  25% {
    opacity: 0.6;
    transform: translateY(25vh) translateX(-20px) rotate(135deg) scale(0.95);
  }
  50% {
    opacity: 0.5;
    transform: translateY(50vh) translateX(25px) rotate(270deg) scale(0.9);
  }
  75% {
    opacity: 0.35;
    transform: translateY(75vh) translateX(-15px) rotate(405deg) scale(0.85);
  }
  92% {
    opacity: 0.15;
    transform: translateY(92vh) translateX(10px) rotate(500deg) scale(0.75);
  }
  100% {
    opacity: 0;
    transform: translateY(105vh) translateX(0px) rotate(540deg) scale(0.6);
  }
}

/* ═══ Decorative gears (pure CSS) ═══ */
.gears {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.gear {
  position: absolute;
  border-radius: 50%;
  animation: gearSpin linear infinite;
}
/* tooth-like effect with box-shadow */
.gear::before {
  content: "";
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 2px dashed rgba(201,163,90,0.06);
}
.gear::after {
  content: "";
  position: absolute;
  inset: 25%;
  border-radius: 50%;
  border: 1.5px solid rgba(168,28,46,0.05);
}
.gear-1 {
  width: 260px; height: 260px;
  top: -60px; left: -50px;
  border: 2px solid rgba(201,163,90,0.05);
  animation-duration: 80s;
}
.gear-2 {
  width: 180px; height: 180px;
  bottom: 10%; right: -30px;
  border: 2px solid rgba(168,28,46,0.05);
  animation-duration: 60s;
  animation-direction: reverse;
}
.gear-3 {
  width: 140px; height: 140px;
  top: 45%; left: 55%;
  border: 1.5px dashed rgba(201,163,90,0.04);
  animation-duration: 100s;
}
.gear-4 {
  width: 220px; height: 220px;
  top: 20%; right: 15%;
  border: 2px solid rgba(168,28,46,0.04);
  animation-duration: 90s;
  animation-direction: reverse;
}
@keyframes gearSpin { to { transform: rotate(360deg); } }

/* ═══ Floating gold particles ═══ */
.particles-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.gold-particle {
  position: absolute;
  width: 3px; height: 3px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0;
  animation: particleDrift ease-in-out infinite;
}
@keyframes particleDrift {
  0%   { opacity: 0; transform: translateY(0) scale(0.5); }
  30%  { opacity: 0.6; }
  70%  { opacity: 0.4; }
  100% { opacity: 0; transform: translateY(-120px) scale(0); }
}

/* ═══ Scrollbar ═══ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: rgba(168,28,46,0.3); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: rgba(168,28,46,0.5); }
::selection { background: rgba(168,28,46,0.4); color: var(--gold-bright); }

/* ═══ Header ═══ */
.header {
  position: relative;
  z-index: 2;
  padding: 0;
}

/* ── Top bar ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 32px;
  border-bottom: 1px solid rgba(168,28,46,0.15);
  backdrop-filter: blur(12px);
  background: rgba(11,8,16,0.6);
}
.topbar-logo {
  font-family: 'Cinzel', 'Noto Serif SC', serif;
  font-size: 1.3rem;
  font-weight: 900;
  color: var(--gold-bright);
  text-shadow: 0 0 16px rgba(201,163,90,0.3);
  letter-spacing: 2px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.topbar-logo .logo-ring {
  width: 40px; height: 40px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
  animation: logoSpin 20s linear infinite;
  border: 2px solid rgba(201,163,90,0.4);
  box-shadow:
    0 0 12px rgba(168,28,46,0.2),
    0 0 0 4px rgba(18,12,22,0.6),
    0 0 0 6px rgba(201,163,90,0.1);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.topbar-logo .logo-ring img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  filter: saturate(0.7) brightness(0.85) contrast(1.1);
  animation: logoCounterSpin 20s linear infinite;
}
/* outer glow ring */
.topbar-logo .logo-ring::after {
  content: "";
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  border: 1.5px solid rgba(201,163,90,0.15);
  animation: logoGlow 3s ease-in-out infinite;
  pointer-events: none;
}
@keyframes logoSpin { to { transform: rotate(360deg); } }
@keyframes logoCounterSpin { to { transform: rotate(-360deg); } }
@keyframes logoGlow {
  0%, 100% { box-shadow: 0 0 6px rgba(168,28,46,0.15); opacity: 0.5; }
  50% { box-shadow: 0 0 16px rgba(201,163,90,0.2); opacity: 1; }
}

.topbar-nav {
  display: flex;
  gap: 20px;
  font-size: 0.85rem;
  color: var(--text-dim);
}
.topbar-nav span { cursor: default; }

/* ── Banner ── */
.banner {
  display: flex;
  align-items: stretch;
  min-height: 320px;
  position: relative;
  overflow: hidden;
}
.banner-img {
  flex: 0 0 42%;
  position: relative;
  overflow: hidden;
}
.banner-img img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  filter: brightness(0.5) contrast(1.1) saturate(0.8);
}
.banner-img::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 40%, var(--bg-deep) 100%);
}
.banner-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 48px 48px 48px 32px;
  position: relative;
}
.banner-content h2 {
  font-family: 'Cinzel', 'Noto Serif SC', serif;
  font-size: 1.8rem;
  font-weight: 900;
  color: var(--gold-bright);
  text-shadow: 0 0 20px rgba(201,163,90,0.25), 0 2px 4px rgba(0,0,0,0.5);
  margin-bottom: 12px;
  letter-spacing: 2px;
  line-height: 1.3;
}
.banner-content h2 em {
  font-style: normal;
  color: var(--crimson-light);
  text-shadow: 0 0 12px var(--glow-red);
}
.banner-content p {
  color: var(--text-dim);
  font-size: 0.95rem;
  max-width: 440px;
  line-height: 1.8;
  letter-spacing: 1px;
}
.banner-content .banner-deco {
  position: absolute;
  top: 24px; right: 48px;
  font-size: 4rem;
  opacity: 0.06;
  color: var(--gold);
  animation: gearSpin 40s linear infinite;
}

/* ── Search row ── */
.search-row {
  padding: 20px 32px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  backdrop-filter: blur(8px);
  background: rgba(11,8,16,0.4);
  border-bottom: 1px solid rgba(168,28,46,0.1);
  position: relative;
  z-index: 2;
}
.search-wrap {
  flex: 1;
  min-width: 240px;
  position: relative;
}
.search-wrap .si {
  position: absolute;
  left: 16px; top: 50%;
  transform: translateY(-50%);
  font-size: 1rem;
  opacity: 0.4;
  pointer-events: none;
}
#search {
  width: 100%;
  padding: 12px 20px 12px 46px;
  border: 1.5px solid rgba(168,28,46,0.2);
  border-radius: 50px;
  font-size: 0.9rem;
  font-family: inherit;
  font-weight: 600;
  background: rgba(18,12,22,0.7);
  color: var(--text-main);
  backdrop-filter: blur(8px);
  outline: none;
  transition: all 0.35s ease;
}
#search:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(201,163,90,0.12), 0 0 24px rgba(201,163,90,0.08);
}
#search::placeholder { color: #5a4d42; font-weight: 600; }

/* ═══ Tabs ═══ */
.tabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.tab {
  padding: 8px 18px;
  border: 1.5px solid rgba(201,163,90,0.15);
  border-radius: 50px;
  font-size: 0.82rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  background: rgba(18,12,22,0.5);
  color: var(--text-dim);
  backdrop-filter: blur(4px);
  transition: all var(--transition);
  user-select: none;
  letter-spacing: 1px;
}
.tab:hover {
  color: var(--gold);
  border-color: rgba(201,163,90,0.35);
  background: rgba(168,28,46,0.08);
}
.tab.active {
  background: linear-gradient(135deg, var(--crimson), #4a0a12);
  color: var(--gold-bright);
  border-color: var(--crimson);
  box-shadow: 0 0 14px var(--glow-red), inset 0 1px 0 rgba(255,255,255,0.04);
  text-shadow: 0 0 8px rgba(232,200,138,0.3);
}

/* ═══ Grid ═══ */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 28px 24px;
  position: relative;
  z-index: 1;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

/* ═══ Card — frosted glass ═══ */
.card {
  background: var(--card-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: var(--radius);
  padding: 24px 22px 20px;
  border: 1.5px solid var(--card-border);
  box-shadow:
    0 4px 24px rgba(0,0,0,0.25),
    inset 0 1px 0 rgba(255,255,255,0.02);
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  flex-direction: column;
  gap: 10px;
  text-decoration: none;
  color: inherit;
  position: relative;
  overflow: hidden;
  content-visibility: auto;
  contain-intrinsic-size: 180px;
}
/* top accent line */
.card::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 2px;
  background: linear-gradient(90deg, transparent, var(--crimson), var(--gold), var(--crimson), transparent);
  opacity: 0;
  transition: opacity var(--transition);
}
/* clock gear watermark */
.card::after {
  content: "⚙";
  position: absolute;
  bottom: -6px; right: -4px;
  font-size: 5rem;
  color: rgba(201,163,90,0.03);
  pointer-events: none;
  transition: color var(--transition);
}

/* Roman numeral index */
.card-roman {
  position: absolute;
  top: 8px;
  right: 12px;
  font-family: 'Cinzel', serif;
  font-size: 1.6rem;
  font-weight: 900;
  letter-spacing: 2px;
  background: linear-gradient(180deg, rgba(201,163,90,0.2) 0%, rgba(168,28,46,0.15) 50%, transparent 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  pointer-events: none;
  animation: romanPulse 4s ease-in-out infinite;
  user-select: none;
}
@keyframes romanPulse {
  0%   { opacity: 0.2; filter: blur(0px); }
  30%  { opacity: 0.6; }
  50%  { opacity: 0.35; filter: blur(0.5px); }
  70%  { opacity: 0.55; }
  100% { opacity: 0.2; filter: blur(0px); }
}
/* stagger each card's roman animation */
.card:nth-child(1) .card-roman  { animation-delay: 0s; }
.card:nth-child(2) .card-roman  { animation-delay: 0.3s; }
.card:nth-child(3) .card-roman  { animation-delay: 0.6s; }
.card:nth-child(4) .card-roman  { animation-delay: 0.9s; }
.card:nth-child(5) .card-roman  { animation-delay: 1.2s; }
.card:nth-child(6) .card-roman  { animation-delay: 1.5s; }
.card:nth-child(7) .card-roman  { animation-delay: 1.8s; }
.card:nth-child(8) .card-roman  { animation-delay: 2.1s; }
.card:nth-child(9) .card-roman  { animation-delay: 2.4s; }
.card:nth-child(10) .card-roman { animation-delay: 2.7s; }

/* brighter on hover */
.card:hover .card-roman {
  animation: none;
  background: linear-gradient(180deg, var(--gold-bright), var(--crimson-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  opacity: 0.8;
  filter: blur(0);
  transition: all 0.4s ease;
}
.card:hover {
  transform: translateY(-6px);
  border-color: rgba(201,163,90,0.4);
  box-shadow:
    0 8px 36px rgba(0,0,0,0.35),
    0 0 20px rgba(201,163,90,0.08),
    inset 0 1px 0 rgba(255,255,255,0.03);
}
.card:hover::before { opacity: 1; }
.card:hover::after { color: rgba(201,163,90,0.06); }

/* particle burst */
.card .particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: visible;
  z-index: 3;
}
.card .particle {
  position: absolute;
  font-size: 10px;
  opacity: 0;
  pointer-events: none;
}
.card:hover .particle {
  animation: particleFloat 0.7s ease-out forwards;
}
@keyframes particleFloat {
  0% { opacity: 0.7; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0.2); }
}

.card-top {
  display: flex;
  align-items: center;
  gap: 12px;
}
.card-icon {
  width: 48px; height: 48px;
  border-radius: 14px;
  overflow: hidden;
  flex-shrink: 0;
  border: 1.5px solid rgba(168,28,46,0.25);
  box-shadow: 0 0 10px rgba(168,28,46,0.1), inset 0 0 6px rgba(0,0,0,0.3);
  position: relative;
}
.card-icon img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  filter: saturate(0.7) brightness(0.85) contrast(1.1);
}
/* mini gear on icon */
.card-icon::after {
  content: "";
  position: absolute;
  top: -3px; right: -3px;
  width: 14px; height: 14px;
  border: 1.5px solid rgba(201,163,90,0.25);
  border-radius: 50%;
  background: rgba(11,8,16,0.8);
  animation: gearSpin 15s linear infinite;
}
.card-icon::before {
  content: "";
  position: absolute;
  top: 0; right: 0;
  width: 8px; height: 8px;
  border: 1px solid rgba(201,163,90,0.15);
  border-radius: 50%;
  z-index: 1;
}

.card-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.05rem;
  font-weight: 900;
  color: var(--gold-bright);
  text-shadow: 0 1px 3px rgba(0,0,0,0.4);
}
.card-desc {
  font-size: 0.83rem;
  color: var(--text-dim);
  line-height: 1.55;
  flex: 1;
}
.card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.card-tag {
  font-size: 0.68rem;
  padding: 2px 9px;
  border-radius: 20px;
  font-weight: 700;
  letter-spacing: 0.5px;
  border: 1px solid;
}
.card-tag[data-tag="国内"] { background: rgba(168,28,46,0.12); color: #d07070; border-color: rgba(168,28,46,0.25); }
.card-tag[data-tag="国外"] { background: rgba(201,163,90,0.08); color: #b8a060; border-color: rgba(201,163,90,0.2); }
.card-tag[data-tag="AI"] { background: rgba(168,28,46,0.08); color: #c08088; border-color: rgba(168,28,46,0.18); }
.card-tag[data-tag="云服务"] { background: rgba(100,80,60,0.1); color: #a09078; border-color: rgba(100,80,60,0.2); }
.card-tag[data-tag="平台"] { background: rgba(140,110,60,0.08); color: #b09868; border-color: rgba(140,110,60,0.18); }
.card-tag[data-tag="支付"] { background: rgba(160,50,50,0.1); color: #c08080; border-color: rgba(160,50,50,0.2); }

.card-link {
  font-size: 0.74rem;
  color: var(--text-dim);
  word-break: break-all;
  opacity: 0.35;
  transition: opacity var(--transition);
}
.card:hover .card-link { opacity: 0.6; }

/* ═══ Empty ═══ */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
  grid-column: 1 / -1;
}
.empty-emoji { font-size: 2.5rem; display: block; margin-bottom: 12px; opacity: 0.5; }

/* ═══ Gothic divider ═══ */
.gothic-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  max-width: 500px;
  margin: 8px auto 0;
  color: rgba(168,28,46,0.3);
  font-size: 0.75rem;
}
.gothic-divider::before, .gothic-divider::after {
  content: ""; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(168,28,46,0.25), transparent);
}

/* ═══ Music player ═══ */
.music-player {
  position: fixed;
  left: 20px;
  bottom: 24px;
  z-index: 90;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: rgba(18,12,22,0.75);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1.5px solid rgba(168,28,46,0.2);
  border-radius: 50px;
  box-shadow:
    0 4px 20px rgba(0,0,0,0.3),
    inset 0 1px 0 rgba(255,255,255,0.02);
  cursor: default;
  transition: all 0.3s ease;
  animation: fadeUp 0.6s ease both;
  animation-delay: 0.5s;
}
.music-player:hover {
  border-color: rgba(201,163,90,0.3);
  box-shadow:
    0 6px 28px rgba(0,0,0,0.35),

/* spinning disc */
.music-disc {
  width: 36px; height: 36px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  border: 2px solid rgba(201,163,90,0.3);
  position: relative;
  box-shadow: 0 0 8px rgba(168,28,46,0.15);
}
.music-disc img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  filter: saturate(0.6) brightness(0.8);
}
.music-disc.spinning {
  animation: discSpin 4s linear infinite;
}
@keyframes discSpin { to { transform: rotate(360deg); } }
/* vinyl center dot */
.music-disc::after {
  content: "";
  position: absolute;
  top: 50%; left: 50%;
  width: 8px; height: 8px;
  margin: -4px 0 0 -4px;
  border-radius: 50%;
  background: var(--bg-deep);
  border: 1px solid rgba(201,163,90,0.3);
  z-index: 1;
}

.music-info {
  min-width: 0;
  max-width: 120px;
}
.music-title {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--gold-bright);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.5px;
}
.music-artist {
  font-size: 0.6rem;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* controls */
.music-controls {
  display: flex;
  align-items: center;
  gap: 6px;
}
.music-btn {
  width: 30px; height: 30px;
  border: none;
  border-radius: 50%;
  background: rgba(168,28,46,0.15);
  color: var(--gold-bright);
  font-size: 0.75rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s ease;
  border: 1px solid rgba(168,28,46,0.2);
}
.music-btn:hover {
  background: rgba(168,28,46,0.3);
  border-color: rgba(168,28,46,0.4);
  transform: scale(1.08);
}
.music-btn.play-btn {
  width: 34px; height: 34px;
  font-size: 0.85rem;
  background: linear-gradient(135deg, var(--crimson), #4a0a12);
  border-color: var(--crimson);
  box-shadow: 0 0 10px var(--glow-red);
}

/* progress bar */
.music-progress {
  position: absolute;
  bottom: 0; left: 16px; right: 16px;
  height: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  z-index: 5;
}
.music-progress-track {
  width: 100%;
  height: 3px;
  background: rgba(168,28,46,0.15);
  border-radius: 2px;
  position: relative;
  overflow: visible;
  transition: height 0.2s ease;
}
.music-progress:hover .music-progress-track {
  height: 5px;
}
.music-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--crimson), var(--gold));
  width: 0%;
  border-radius: 2px;
  position: relative;
}
/* drag handle */
.music-progress-bar::after {
  content: "";
  position: absolute;
  right: -5px; top: 50%;
  width: 10px; height: 10px;
  margin-top: -5px;
  border-radius: 50%;
  background: var(--gold-bright);
  border: 2px solid var(--crimson);
  box-shadow: 0 0 6px rgba(168,28,46,0.3);
  opacity: 0;
  transform: scale(0.5);
  transition: opacity 0.2s, transform 0.2s;
}
.music-progress:hover .music-progress-bar::after {
  opacity: 1;
  transform: scale(1);
}
/* time tooltip */
.music-progress-time {
  position: absolute;
  bottom: 100%;
  left: 0;
  margin-bottom: 4px;
  padding: 2px 6px;
  background: rgba(18,12,22,0.9);
  border: 1px solid rgba(201,163,90,0.2);
  border-radius: 4px;
  font-size: 0.6rem;
  color: var(--gold-bright);
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transform: translateX(-50%);

}
.music-progress:hover .music-progress-time {
  opacity: 1;
}

/* visualizer bars */
.music-visualizer {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 20px;
  margin-left: 4px;
}
.vis-bar {
  width: 3px;

}

}
@keyframes visBounce {

}
.vis-bar:nth-child(2) { animation-delay: 0.1s; }
.vis-bar:nth-child(3) { animation-delay: 0.2s; }
.vis-bar:nth-child(4) { animation-delay: 0.3s; }

/* mobile */
@media (max-width: 640px) {

.footer {

.footer-label {

}

}
@keyframes fpFloat {
  0%   { opacity: 0; transform: translateY(20px) rotate(0deg) scale(0.5); }

  70%  { opacity: 0.5; }
  100% { opacity: 0; transform: translateY(-60px) rotate(360deg) scale(0); }

/* rising sakura petals in footer */
.footer-petals {
  position: absolute;

/* sparkle dots */
.footer-sparkles {

@keyframes sparkleAnim {

/* pulse ring */
.footer-pulse {

.pet-bubble {

// ── Pet toggle ──
const petCharacter = document.getElementById("petCharacter");
const petPanel = document.getElementById("petPanel");
const petBackdrop = document.getElementById("petBackdrop");
const petBubble = document.getElementById("petBubble");
let petPanelOpen = false;
let petPanelBgLoaded = false;

function togglePetPanel() {
  petPanelOpen = !petPanelOpen;
  if (petPanelOpen) {
    // lazy-load sidebar background image
    if (!petPanelBgLoaded) {
      petPanelBgLoaded = true;
      const panelBg = petPanel.querySelector('.pet-panel-bg');
      panelBg.style.backgroundImage = "url('assets/images/sidebar-bg.jpg')";
    }
    // position panel near the pet
    const rect = petContainer.getBoundingClientRect();
    const vw = window.innerWidth;
    const panelW = 300;
    if (rect.left > vw / 2) {
      // pet on right side → open panel to its left
      petPanel.style.right = "auto";
      petPanel.style.left = Math.max(10, rect.left - panelW - 12) + "px";
    } else {
      // pet on left side → open panel to its right
      petPanel.style.left = "auto";
      petPanel.style.right = Math.max(10, vw - rect.right - panelW - 12) + "px";
    }
  }
  petPanel.classList.toggle("open", petPanelOpen);
  petBackdrop.classList.toggle("show", petPanelOpen);
}
petCharacter.addEventListener("click", togglePetPanel);
petBackdrop.addEventListener("click", () => { if (petPanelOpen) togglePetPanel(); });

// ── Pet random page movement ──
const petContainer = document.getElementById("petContainer");
let petMoving = false;

function movePetRandom() {
  if (petPanelOpen) return;

  const petW = 140;
  const petH = 180;
  const pad = 24;
  const musicZone = { left: 0, bottom: 0, w: 280, h: 80 };

  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const maxX = vw - petW - pad;
  const maxY = vh - petH - pad;

  let x, y, attempts = 0;
  do {
    x = pad + Math.random() * (maxX - pad);
    y = pad + Math.random() * (maxY - pad);
    attempts++;
  } while (
    attempts < 20 &&
    x < musicZone.w &&
    y > vh - musicZone.h - petH
  );

  petContainer.style.left = x + "px";
  petContainer.style.top = y + "px";
  petMoving = true;
}

// initial position
petContainer.style.left = (window.innerWidth - 180) + "px";
petContainer.style.top = (window.innerHeight - 240) + "px";

// move every 8-15 seconds
function schedulePetMove() {
  const delay = 8000 + Math.random() * 7000;
  setTimeout(() => {
    movePetRandom();
    schedulePetMove();
  }, delay);
}
schedulePetMove();

// ── Music player ──
const musicAudio = document.getElementById("musicAudio");
const musicPlay = document.getElementById("musicPlay");
const musicDisc = document.getElementById("musicDisc");
const musicPlayer = document.getElementById("musicPlayer");
const musicProgressBar = document.getElementById("musicProgressBar");
let musicPlaying = false;

musicPlay.addEventListener("click", () => {
  if (musicPlaying) {
    musicAudio.pause();
    musicPlay.textContent = "▶";
    musicDisc.classList.remove("spinning");
    musicPlayer.classList.remove("playing");
  } else {
    musicAudio.play();
    musicPlay.textContent = "⏸";
    musicDisc.classList.add("spinning");
    musicPlayer.classList.add("playing");
  }
  musicPlaying = !musicPlaying;
});

const musicProgress = document.getElementById("musicProgress");
const musicProgressTime = document.getElementById("musicProgressTime");
let isDragging = false;

function formatTime(sec) {
  if (isNaN(sec)) return "0:00";
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m + ":" + (s < 10 ? "0" : "") + s;
}

function seekFromEvent(e) {
  const rect = musicProgress.getBoundingClientRect();
  let ratio = (e.clientX - rect.left) / rect.width;
  ratio = Math.max(0, Math.min(1, ratio));
  if (musicAudio.duration) {
    musicAudio.currentTime = ratio * musicAudio.duration;
    musicProgressBar.style.width = (ratio * 100) + "%";
  }
}

musicProgress.addEventListener("mousedown", (e) => {
  isDragging = true;
  seekFromEvent(e);
});
document.addEventListener("mousemove", (e) => {
  if (isDragging) seekFromEvent(e);
  // update time tooltip position
  const rect = musicProgress.getBoundingClientRect();
  if (e.clientX >= rect.left && e.clientX <= rect.right) {
    let ratio = (e.clientX - rect.left) / rect.width;
    ratio = Math.max(0, Math.min(1, ratio));
    musicProgressTime.style.left = (ratio * 100) + "%";
    if (musicAudio.duration) {
      musicProgressTime.textContent = formatTime(ratio * musicAudio.duration);
    }
  }
});
document.addEventListener("mouseup", () => { isDragging = false; });

// touch support
musicProgress.addEventListener("touchstart", (e) => {
  isDragging = true;
  seekFromEvent(e.touches[0]);
}, { passive: true });
document.addEventListener("touchmove", (e) => {
  if (isDragging) seekFromEvent(e.touches[0]);
}, { passive: true });
document.addEventListener("touchend", () => { isDragging = false; });

// update progress on play
musicAudio.addEventListener("timeupdate", () => {
  if (musicAudio.duration && !isDragging) {
    const pct = (musicAudio.currentTime / musicAudio.duration) * 100;
    musicProgressBar.style.width = pct + "%";
  }
});

musicAudio.addEventListener("ended", () => {
  musicPlaying = false;
  musicPlay.textContent = "▶";
  musicDisc.classList.remove("spinning");
  musicPlayer.classList.remove("playing");
  musicProgressBar.style.width = "0%";
});

const statsClicks = document.getElementById("statsClicks");

// uptime
const startTime = Date.now();
function updateUptime() {
  const diff = Math.floor((Date.now() - startTime) / 1000);
  const h = Math.floor(diff / 3600);
  const m = Math.floor((diff % 3600) / 60);
  const s = diff % 60;
  statsUptime.textContent = h + ":" + (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
}
setInterval(updateUptime, 1000);
updateUptime();

// daily visitors (localStorage based, per day)
const today = new Date().toISOString().slice(0, 10);
const visitorKey = "sakura_visitors_" + today;
const sessionKey = "sakura_session_" + today;

let visitors = parseInt(localStorage.getItem(visitorKey)) || 0;
if (!sessionStorage.getItem(sessionKey)) {
  visitors++;
  localStorage.setItem(visitorKey, visitors);
  sessionStorage.setItem(sessionKey, "1");
}
statsVisitors.textContent = visitors;

// clean old days (keep only today)
for (let i = 0; i < localStorage.length; i++) {
  const k = localStorage.key(i);
  if (k && k.startsWith("sakura_visitors_") && k !== visitorKey) {
    localStorage.removeItem(k);
    i--;
  }
}

// click count
const clickKey = "sakura_clicks";
let totalClicks = parseInt(localStorage.getItem(clickKey)) || 0;
statsClicks.textContent = totalClicks;

document.addEventListener("click", (e) => {
  // only count meaningful clicks (cards, links, buttons)
  if (e.target.closest(".card, .tab, .music-btn, .pet-character, .pet-panel-item, .sidebar-item")) {
    totalClicks++;
    localStorage.setItem(clickKey, totalClicks);
    statsClicks.textContent = totalClicks;
    // brief flash effect
    statsClicks.style.color = "#fff";
    setTimeout(() => { statsClicks.style.color = ""; }, 200);
  }
});

// ── Tabs ──
const allTabs = ["全部","国内","国外","AI","云服务","平台","支付"];
let activeTab = "全部";
let searchQuery = "";

const tabsEl = document.getElementById("tabs");
allTabs.forEach(t => {
  const btn = document.createElement("button");
  btn.className = "tab" + (t === "全部" ? " active" : "");
  btn.textContent = t;
  btn.onclick = () => {
    activeTab = t;
    tabsEl.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b.textContent === t));
    render();
  };
  tabsEl.appendChild(btn);
});

// ── Roman numeral converter ──
function toRoman(n) {
  const vals = [1000,900,500,400,100,90,50,40,10,9,5,4,1];
  const syms = ["M","CM","D","CD","C","XC","L","XL","X","IX","V","IV","I"];
  let r = "";
  for (let i = 0; i < vals.length; i++) {
    while (n >= vals[i]) { r += syms[i]; n -= vals[i]; }
  }
  return r;
}

// ── Render ──
const grid = document.getElementById("grid");
function render() {
  const q = searchQuery.toLowerCase();
  const filtered = platforms.filter(p => {
    const tabMatch = activeTab === "全部" || p.tags.includes(activeTab);
    const searchMatch = !q || p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q) || p.tags.some(t => t.includes(q));
    return tabMatch && searchMatch;
  });

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty"><span class="empty-emoji">🥀</span><p>时间之流中，未寻得此名……</p></div>`;
    return;
  }

  // crop positions for the same avatar image
  const crops = [
    "20% 15%","50% 10%","80% 20%","30% 50%","60% 45%",
    "15% 70%","45% 65%","75% 55%","25% 85%","55% 80%",
    "10% 35%","40% 30%","70% 40%","85% 60%","35% 75%",
    "65% 25%","90% 50%","5% 55%","50% 90%","78% 78%"
  ];

  grid.innerHTML = filtered.map((p, i) => {
    const delay = Math.min(i * 0.04, 0.4);
    const particles = ["❀","✦","☆","♦","⚙"];
    const colors = ["#c41e3a","#c9a35a","#8b0000","#e8c88a","#a81c2e"];
    const particleHTML = Array.from({length: 5}, (_, j) => {
      const px = (Math.random() * 100 - 50).toFixed(0);
      const py = -(25 + Math.random() * 50).toFixed(0);
      return `<span class="particle" style="left:50%;top:30%;--px:${px}px;--py:${py}px;animation-delay:${j*0.08}s;color:${colors[j]}">${particles[j]}</span>`;
    }).join("");
    const crop = crops[i % crops.length];
    const roman = toRoman(i + 1);

    return `
    <a class="card" href="${p.url}" target="_blank" rel="noopener noreferrer"
       style="animation-delay:${delay}s">
      <span class="card-roman">${roman}</span>
      <div class="particles">${particleHTML}</div>
      <div class="card-top">
        <div class="card-icon"><img src="assets/images/avatar.png" alt="${p.name}" style="object-position:${crop}" loading="lazy" decoding="async"></div>
        <div class="card-title">${p.name}</div>
      </div>
      <div class="card-desc">${p.desc}</div>
      <div class="card-tags">${p.tags.map(t => `<span class="card-tag" data-tag="${t}">${t}</span>`).join("")}</div>
      <div class="card-link">${p.url}</div>
    </a>`;
  }).join("");
}

document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value.trim();
  render();
});

render();
